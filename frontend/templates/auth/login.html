{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login | Arena Vila Sol</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="shortcut icon" href="{% static 'assets/img/logo.png' %}">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body {
            font-family: "Poppins", sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #f6f6f6;
        }


        .login-container {
            display: flex;
            min-height: 100vh;
        }


        .login-hero {
            flex: 1;
            background: linear-gradient(135deg, darkorange, #ffb347);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            padding: 40px;
        }

        .login-hero img {
            width: 120px;
            margin-bottom: 20px;
        }

        .login-hero h2 {
            font-weight: 600;
        }


        .login-form {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .login-title {
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-control {
            border-radius: 8px;
            padding: 10px;
        }

        .btn-login {
            background: darkorange;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-weight: 600;
            transition: .2s;
        }

        .btn-login:hover {
            background: #e26a00;
        }

        .criar-conta a {
            color: darkorange;
            text-decoration: none;
            font-weight: 600;
        }


        @media(max-width:768px) {

            .login-hero {
                display: none;
            }

            body {
                background: linear-gradient(135deg, darkorange, #ffb347);
            }

            .login-card {
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
                padding: 20px;
            }

            .login-form {
                padding: 10px;
            }

        }

        .password-box {
            position: relative;
        }

        .password-box input {
            padding-right: 40px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 12px;
            cursor: pointer;
            color: #777;
            font-size: 16px;
        }
    </style>

</head>

<body>

    <div class="login-container">

        <div class="login-hero">

            <img src="{% static 'assets/img/logo.png' %}">

            <h2>Arena Vila Sol</h2>

            <div class="socials">

            </div>
        </div>

        <div class="login-form">

            <div class="login-card">

                <div class="login-title">
                    <i class="fa fa-user-circle"></i> Login
                </div>

                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <label class="form-label">
                        <i class="fa fa-envelope"></i> Email
                    </label>

                    <input type="text" name="username" class="form-control mb-3" placeholder="Digite seu email"
                        required>

                    <label class="form-label">
                        <i class="fa fa-lock"></i> Senha
                    </label>

                    <div class="password-box">
                        <input type="password" name="password" id="password" class="form-control mb-4"
                            placeholder="Digite sua senha" required autocomplete="off">

                        <span class="toggle-password" onclick="togglePassword()">
                            <i class="fa fa-eye" id="eyeIcon"></i>
                        </span>
                    </div>

                    <button type="submit" class="btn btn-login w-100">
                        <i class="fa fa-sign-in"></i>
                        Entrar
                    </button>

                </form>

                <div class="text-center mt-4 criar-conta">

                    <small class="text-muted">
                        Não tem conta?
                    </small>

                    <br>

                    <a href="{% url 'criar_conta' %}">
                        Criar conta
                    </a>

                </div>

                <div class="text-center mt-3">

                    <a href="{% url 'password_reset' %}" class="text-muted" style="font-size:14px;">
                        Esqueceu sua senha?
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>
<script>
    function togglePassword() {

        const password = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            password.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }

    }
</script>

</html>
