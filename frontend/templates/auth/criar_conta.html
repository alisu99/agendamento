{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Criar conta | AGAS</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

        <div class="formulario p-4">

            <h4 class="text-center mb-4">Criar conta</h4>

            <form method="POST">

                {% csrf_token %}

                <label class="form-label">Nome</label>
                <input type="text" name="first_name" class="form-control mb-3" required>

                <label class="form-label">Sobrenome</label>
                <input type="text" name="last_name" class="form-control mb-3" required>

                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control mb-3" required>

                <label class="form-label">CPF</label>
                <input type="text" name="cpf" class="form-control mb-3" required>

                <label class="form-label">Telefone (Whatsapp)</label>
                <input type="text" name="telefone" id="telefone" class="form-control mb-3" required>

                <label class="form-label">Data de nascimento</label>
                <input type="date" name="data_nasc" class="form-control mb-3">

                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control mb-3" required>

                <button type="submit" class="btn btn-success w-100">
                    Criar conta
                </button>

            </form>

            <div class="text-center mt-3">
                Já tem conta?
                <a href="{% url 'login' %}">Entrar</a>
            </div>

        </div>

    </div>
    <script src="https://unpkg.com/imask"></script>

    <script>
        IMask(
            document.querySelector('[name="cpf"]'),
            { mask: '000.000.000-00' }
        )


        const telefoneInput = document.getElementById("telefone")

        if (telefoneInput) {

            telefoneInput.addEventListener("input", function () {

                let numero = this.value.replace(/\D/g, "")

                if (numero.length > 11) {
                    numero = numero.slice(0, 11)
                }

                if (numero.length > 10) {
                    numero = numero.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3")
                } else if (numero.length > 6) {
                    numero = numero.replace(/^(\d{2})(\d{4})(\d+)/, "($1) $2-$3")
                } else if (numero.length > 2) {
                    numero = numero.replace(/^(\d{2})(\d+)/, "($1) $2")
                } else {
                    numero = numero.replace(/^(\d*)/, "($1")
                }

                this.value = numero

            })

        }
    </script>
</body>

</html>
