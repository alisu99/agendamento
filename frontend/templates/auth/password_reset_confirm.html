{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Nova senha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body {
            font-family: "Poppins", sans-serif;
            margin: 0;
            background: #f6f6f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 900px;
            max-width: 95%;
        }

        .login-hero {
            background: darkorange;
            color: white;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .login-hero img {
            width: 90px;
            margin-bottom: 15px;
        }

        .login-hero h2 {
            font-weight: 600;
        }

        .login-form {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-card {
            width: 100%;
            max-width: 350px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }

        .form-label {
            font-weight: 500;
        }

        .btn-login {
            background: darkorange;
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #e07b00;
        }

        .password-box {
            position: relative;
        }

        .password-box input {
            padding-right: 40px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 10px;
            cursor: pointer;
            color: #777;
        }

        a {
            text-decoration: none;
            color: darkorange;
            font-weight: 500;
        }

        @media (max-width:768px) {

            .login-container {
                flex-direction: column;
            }

            .login-hero {
                padding: 30px;
            }

        }
    </style>

</head>

<body>

    <div class="login-container">

        <div class="login-hero">

            <img src="{% static 'assets/img/logo.png' %}">

            <h2>Arena Vila Sol</h2>

        </div>

        <div class="login-form">

            <div class="login-card">

                <div class="login-title">
                    <i class="fa fa-lock"></i> Criar nova senha
                </div>

                <p class="text-muted text-center mb-4" style="font-size:14px;">
                    Digite sua nova senha para acessar o sistema.
                </p>

                <form method="POST">

                    {% csrf_token %}

                    <label class="form-label">
                        <i class="fa fa-lock"></i> Nova senha
                    </label>

                    <div class="password-box">
                        {{ form.new_password1 }}
                        <span class="toggle-password" onclick="togglePassword('id_new_password1', this)">
                            <i class="fa fa-eye"></i>
                        </span>
                    </div>

                    <br>

                    <label class="form-label">
                        <i class="fa fa-lock"></i> Confirmar senha
                    </label>

                    <div class="password-box">
                        {{ form.new_password2 }}
                        <span class="toggle-password" onclick="togglePassword('id_new_password2', this)">
                            <i class="fa fa-eye"></i>
                        </span>
                    </div>

                    <br>

                    <button type="submit" class="btn btn-login w-100">

                        <i class="fa fa-check"></i>
                        Alterar senha

                    </button>

                </form>

                <div class="text-center mt-4">

                    <a href="{% url 'login' %}">
                        Voltar para login
                    </a>

                </div>

            </div>

        </div>

    </div>

    <script>

        function togglePassword(id, el) {

            const input = document.getElementById(id)
            const icon = el.querySelector("i")

            if (input.type === "password") {
                input.type = "text"
                icon.classList.replace("fa-eye", "fa-eye-slash")
            } else {
                input.type = "password"
                icon.classList.replace("fa-eye-slash", "fa-eye")
            }

        }

    </script>

</body>

</html>
