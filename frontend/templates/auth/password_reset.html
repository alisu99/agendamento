{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Recuperar senha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body {
            font-family: "Poppins", sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #f6f6f6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 900px;
            max-width: 95%;
        }

        .login-hero {
            background: darkorange;
            color: white;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .login-hero img {
            width: 90px;
            margin-bottom: 15px;
        }

        .login-hero h2 {
            font-weight: 600;
        }

        .login-form {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-card {
            width: 100%;
            max-width: 350px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: #333;
        }

        .form-label {
            font-weight: 500;
        }

        .btn-login {
            background: darkorange;
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #e07b00;
        }

        a {
            text-decoration: none;
            color: darkorange;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width:768px) {

            .login-container {
                flex-direction: column;
            }

            .login-hero {
                padding: 30px;
            }

        }
    </style>

</head>

<body>

    <div class="login-container">

        <div class="login-hero">

            <img src="{% static 'assets/img/logo.png' %}">

            <h2>Arena Vila Sol</h2>

        </div>

        <div class="login-form">

            <div class="login-card">

                <div class="login-title">
                    <i class="fa fa-key"></i> Recuperar senha
                </div>

                <p class="text-muted text-center mb-4" style="font-size:14px;">
                    Digite o email da sua conta para receber o link de redefinição de senha.
                </p>

                <form method="POST">

                    {% csrf_token %}

                    <label class="form-label">
                        <i class="fa fa-envelope"></i> Email
                    </label>

                    <input type="email" name="email" class="form-control mb-4" placeholder="Digite seu email" required>

                    <button type="submit" class="btn btn-login w-100">

                        <i class="fa fa-paper-plane"></i>
                        Enviar link de recuperação

                    </button>

                </form>

                <div class="text-center mt-4">

                    <small class="text-muted">
                        Lembrou sua senha?
                    </small>

                    <br>

                    <a href="{% url 'login' %}">
                        Voltar para login
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
