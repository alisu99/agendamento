<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Agendar Quadra</title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }

        .step {
            margin-bottom: 40px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            width: 350px;
        }

        .horario {
            display: block;
            margin: 8px 0;
        }

        .disabled {
            opacity: 0.5;
        }
    </style>

</head>

<body>


    <header>
        <nav class="navbar">
            <h2>Arena AGAS</h2>
            <div>
                <div class="nav-link"><a href="/">Início</a></div>
                <div class="nav-link"><a href="{% url 'meus-agendamentos' %}">Meus agendamentos</a></div>
            </div>
        </nav>
    </header>

    <div>
        <form method="POST">
            {% csrf_token %}

            <!-- DATA -->

            <div class="step card" id="step-data">

                <h3>1️⃣ Escolha a data</h3>

                <input type="date" name="data" id="data">

            </div>


            <!-- QUADRA -->

            <div class="step card disabled" id="step-quadra">

                <h3>2️⃣ Escolha a quadra</h3>

                <select name="quadra" id="quadra" disabled required>

                    <option value="">Selecione</option>
                    {% for q in quadras %}
                    <option value="{{q.id}}">
                        {{q.apelido}} - Quadra {{q.numeracao}}
                    </option>
                    {% endfor %}

                </select>

            </div>


            <!-- HORARIO -->

            <div class="step card disabled" id="step-horario">

                <h3>3️⃣ Escolha o horário</h3>

                <div id="lista-horarios"></div>

            </div>


            <!-- CONFIRMAR -->

            <div class="step card disabled" id="step-confirmar">

                <h3>4️⃣ Confirmar</h3>

                <button type="submit">Agendar</button>

            </div>

        </form>
    </div>

    <script>

        const dataInput = document.getElementById("data")
        const quadraSelect = document.getElementById("quadra")
        const listaHorarios = document.getElementById("lista-horarios")
        const confirmar = document.querySelector("#step-confirmar button")

        confirmar.disabled = true

        function carregarHorarios() {

            const data = dataInput.value
            const quadra = quadraSelect.value

            if (!data || !quadra) return

            fetch(`/horarios/?data=${data}&quadra=${quadra}`)
                .then(response => response.json())
                .then(horarios => {

                    listaHorarios.innerHTML = ""

                    if (horarios.length === 0) {

                        listaHorarios.innerHTML = "<p>Nenhum horário disponível para essa data</p>"
                        return
                    }

                    horarios.forEach(h => {

                        const label = document.createElement("label")
                        label.classList.add("horario")

                        label.innerHTML = `
                <input type="radio" name="horario" value="${h.id}">
                ${h.inicio} às ${h.fim}
            `

                        listaHorarios.appendChild(label)

                    })

                    document.getElementById("step-horario").classList.remove("disabled")

                    document.getElementById("step-horario").scrollIntoView({
                        behavior: "smooth"
                    })

                    ativarEventoHorarios()

                })

        }

        function ativarEventoHorarios() {

            const radios = document.querySelectorAll("input[name='horario']")

            radios.forEach(r => {

                r.addEventListener("change", () => {

                    confirmar.disabled = false

                    document.getElementById("step-confirmar").classList.remove("disabled")

                    document.getElementById("step-confirmar").scrollIntoView({
                        behavior: "smooth"
                    })

                })

            })

        }


        dataInput.addEventListener("change", () => {

            quadraSelect.disabled = false
            document.getElementById("step-quadra").classList.remove("disabled")

        })


        quadraSelect.addEventListener("change", carregarHorarios)

    </script>

</body>

</html>
