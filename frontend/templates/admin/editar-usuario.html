{% extends 'base/base.html' %}

{% block content %}
<title>Editar | {{usuario.email}}</title>
<div class="d-flex flex-column align-items-center">
    <form method="POST">
        <h5 class="mb-3"><i class="fa fa-user"></i> Editar usuário</h5>
        {% csrf_token %}

        <div class="card mb-3">
            <div>
                <h5 class="mb-3">Autenticação</h5>
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{usuario.email}}">
                <br>
                <label class="form-label">Nova senha</label>
                <input type="password" name="password" class="form-control" placeholder="Digite uma nova senha">
            </div>
            <br>
        </div>

        <div class="card mb-3">
            <div>
                <label class="form-label">Nome</label>
                <input type="text" name="first_name" class="form-control" value="{{usuario.first_name}}">
                <br>
                <label class="form-label">Sobrenome</label>
                <input type="text" name="last_name" class="form-control" value="{{usuario.last_name}}">
                <br>
                <label class="form-label">CPF</label>
                <input type="text" name="cpf" class="form-control" value="{{usuario.cpf}}">
                <br>
                <label class="form-label">Contato (Whatsapp)</label>
                <input type="text" name="telefone" id="telefone" class="form-control" value="{{usuario.telefone}}">
                <br>
                <label class="form-label">Data de nascimento</label>
                <input type="date" name="data_nasc" class="form-control" value="{{usuario.data_nasc|date:'Y-m-d'}}">
            </div>
        </div>

        <div class="card mb-3">
            <div>
                <h5 class="mb-3">Administrativo</h5>


                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if usuario.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">
                        Ativo
                    </label>
                </div>

                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="is_staff" id="is_staff" {% if usuario.is_staff %}checked{% endif %}>
                    <label class="form-check-label" for="is_staff">
                        Administrador
                    </label>
                </div>
                <hr>
                <small>
                    Último login: {{usuario.last_login|date:"d/m/Y H:i"}} <br>
                    Data de registro: {{ usuario.date_joined|date:"d/m/Y H:i" }}
                </small>
            </div>
            <br>
        </div>

        <button type="submit" class="btn btn-success px-4 w-100">
            Atualizar dados
        </button>
    </form>

    <script src="https://unpkg.com/imask"></script>
    <script>
        IMask(
            document.querySelector('[name="cpf"]'),
            { mask: '000.000.000-00' }
        )


        const telefoneInput = document.getElementById("telefone")

        if (telefoneInput) {

            telefoneInput.addEventListener("input", function () {

                let numero = this.value.replace(/\D/g, "")

                if (numero.length > 11) {
                    numero = numero.slice(0, 11)
                }

                if (numero.length > 10) {
                    numero = numero.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3")
                } else if (numero.length > 6) {
                    numero = numero.replace(/^(\d{2})(\d{4})(\d+)/, "($1) $2-$3")
                } else if (numero.length > 2) {
                    numero = numero.replace(/^(\d{2})(\d+)/, "($1) $2")
                } else {
                    numero = numero.replace(/^(\d*)/, "($1")
                }

                this.value = numero

            })

        }
    </script>
</div>

{% endblock %}
